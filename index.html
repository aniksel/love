<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>❤️</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Arial", sans-serif;
      background: linear-gradient(-45deg, #0f1020, #311b2f, #1a2a4f, #4a1831);
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
      color: white;
      position: relative;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .stars,
    .hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.8); }
    }

    .heart-float {
      position: absolute;
      bottom: -40px;
      font-size: 20px;
      opacity: 0.85;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 0 8px rgba(255, 80, 120, 0.6));
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.9);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(-120vh) rotate(360deg) scale(1.3);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(92vw, 760px);
      padding: 40px 28px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      box-shadow:
        0 10px 40px rgba(0,0,0,0.35),
        inset 0 0 0 1px rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      animation: cardIn 1.5s ease;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .small {
      font-size: 16px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 18px;
      animation: fadeIn 2s ease;
    }

    .title {
      font-size: clamp(42px, 9vw, 92px);
      line-height: 1.05;
      font-weight: 700;
      margin: 0;
      animation: fadeInUp 1.6s ease;
      text-shadow: 0 0 18px rgba(255, 120, 170, 0.35);
    }

    .title span {
      display: inline-block;
      animation: pulse 1.2s infinite ease-in-out;
    }

    .subtitle {
      margin-top: 20px;
      font-size: clamp(18px, 3vw, 28px);
      opacity: 0.95;
      animation: fadeInUp 2.1s ease;
    }

    .line {
      width: 110px;
      height: 4px;
      margin: 24px auto;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff7aa2, #ffd1e0, #ff7aa2);
      box-shadow: 0 0 18px rgba(255, 110, 170, 0.5);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { transform: scaleX(0.95); opacity: 0.7; }
      to { transform: scaleX(1.08); opacity: 1; }
    }

    .hint {
      margin-top: 22px;
      font-size: 15px;
      opacity: 0.75;
      animation: fadeIn 3s ease;
    }

    .btn {
      margin-top: 28px;
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 18px;
      cursor: pointer;
      color: white;
      background: linear-gradient(90deg, #ff5f8f, #ff7eb3);
      box-shadow: 0 8px 28px rgba(255, 90, 140, 0.38);
      animation: buttonPulse 1.8s infinite;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 34px rgba(255, 90, 140, 0.52);
    }

    .secret {
      margin-top: 26px;
      font-size: clamp(22px, 4vw, 34px);
      min-height: 44px;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.6s ease;
      text-shadow: 0 0 12px rgba(255,255,255,0.25);
    }

    .secret.show {
      opacity: 1;
      transform: translateY(0);
    }

    .secret .big-heart {
      display: inline-block;
      animation: pulse 1s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    @keyframes buttonPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 32px 20px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="hearts" id="hearts"></div>

  <div class="card">
    <div class="small">маленькая открытка</div>
    <h1 class="title">я вас люблю <span>❤️</span></h1>
    <div class="line"></div>
    <div class="subtitle">очень-очень сильно</div>
    <button class="btn" onclick="showMessage()">нажми сюда</button>
    <div class="secret" id="secret">и это вообще-то официальное признание <span class="big-heart">💌</span></div>
    <div class="hint">эта страница сделана специально для вас</div>
  </div>

  <script>
    const stars = document.getElementById("stars");
    const hearts = document.getElementById("hearts");

    for (let i = 0; i < 55; i++) {
      const star = document.createElement("div");
      star.className = "star";
      star.style.left = Math.random() * 100 + "%";
      star.style.top = Math.random() * 100 + "%";
      star.style.animationDelay = Math.random() * 3 + "s";
      star.style.animationDuration = 2 + Math.random() * 3 + "s";
      stars.appendChild(star);
    }

    const heartSymbols = ["❤️", "💖", "💕", "💗", "💘"];

    for (let i = 0; i < 22; i++) {
      const heart = document.createElement("div");
      heart.className = "heart-float";
      heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
      heart.style.left = Math.random() * 100 + "%";
      heart.style.animationDuration = 6 + Math.random() * 8 + "s";
      heart.style.animationDelay = Math.random() * 8 + "s";
      heart.style.fontSize = 16 + Math.random() * 26 + "px";
      hearts.appendChild(heart);
    }

    function showMessage() {
      document.getElementById("secret").classList.add("show");
    }
  </script>
</body>
</html>
