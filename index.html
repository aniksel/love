<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.text {
  font-size: 50px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  text-align: center;
}

.heart {
  display: inline-block;
  animation: pulse 1s infinite;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
</style>

</head>

<body>

<div class="text">
  я вас люблю <span class="heart">❤️</span>
</div>

</body>
</html>
